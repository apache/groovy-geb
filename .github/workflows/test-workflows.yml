      - name: Save Gradle cache
        uses: actions/cache@v4
        with:
          path: .gradle-home
          key: gradle-home-dockerised-crossbrowser-${{ github.ref }}-${{ github.run_id }}
  manual:
    runs-on: ubuntu-latest
    container:
      image: selenium/standalone-firefox
    env:
      GRADLE_OPTS: -Xmx1024m -XX:MaxMetaspaceSize=256m
      GRADLE_USER_HOME: .gradle-home
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Docker
        uses: docker/setup-buildx-action@v4

      - name: Restore Gradle cache
        uses: actions/cache@v4
        with:
          path: .gradle-home
          key: gradle-home-manual-machine-${{ github.ref }}
          restore-keys: |
            gradle-home-manual-machine-${{ github.ref }}
            gradle-home-manual-machine-master
            gradle-home-manual-machine

      - name: Run Gradle tasks
        run: |
          Xvfb :99 -screen 1 1280x1024x16 -nolisten tcp > /dev/null 2>&1 &
          ./gradlew --no-daemon --max-workers 4 --parallel -Pci :doc:manual-snippets:check :doc:manual-snippets:fixtures:check :doc:manual-snippets:real-browser:check :doc:manual:build :doc:asciidoctor-extension:check

      - name: Copy all test results to a directory
        run: |
          mkdir -p ~/test-results/junit/
          find . -type f -regex ".*/build/test-results/.*xml" -exec cp {} ~/test-results/junit/ \;

      - name: Store test results
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ~/test-results/

      - name: Store build reports
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: build/reports

      - name: Save Gradle cache
        uses: actions/cache@v4
        with:
          path: .gradle-home
          key: gradle-home-manual-machine-${{ github.ref }}-${{ github.run_id }}
