name: CI

on:
  push:
    branches:
      - master
      - task/213-github-actions-for-ci
  pull_request:

jobs:
  check:
    uses: ./.github/workflows/common.yml
    with:
      gradle_task: 'module:check internal:check integration:check doc:site:check --continue'
      container_image: 'eclipse-temurin:21-jdk'

  dockerised-cross-browser:
    uses: ./.github/workflows/common.yml
    with:
      gradle_task: 'allDockerisedCrossBrowserTests'
      container_image: 'eclipse-temurin:21-jdk'

  manual:
    uses: ./.github/workflows/common.yml
    with:
      gradle_task: ':doc:manual-snippets:check :doc:manual-snippets:fixtures:check :doc:manual-snippets:real-browser:check :doc:manual:build :doc:asciidoctor-extension:check'
      container_image: 'selenium/standalone-firefox'

  local-cross-browser:
    uses: ./.github/workflows/common.yml
    with:
      gradle_task: 'localChromeTest'
      container_image: 'selenium/standalone-chromium'

  saucelabs:
    uses: ./.github/workflows/common.yml
    with:
      gradle_task: 'allSauceLabsTests'
      container_image: 'eclipse-temurin:21-jdk'

  non-ie:
    uses: ./.github/workflows/common.yml
    with:
      gradle_task: 'nonIeBrowserStackTests'
      container_image: 'eclipse-temurin:21-jdk'

  ie:
    uses: ./.github/workflows/common.yml
    with:
      gradle_task: 'ieBrowserStackTests'
      container_image: 'eclipse-temurin:21-jdk'
